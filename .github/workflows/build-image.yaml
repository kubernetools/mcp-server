name: Build and push

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      mcp_version:
        description: 'docgen release tag to download (e.g. v0.1.0); defaults to the pushed tag'
        required: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/kubernetools/mcp-server

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download mcp binary from docgen release
        run: |
          gh release download "${{ inputs.mcp_version || github.ref_name }}" \
            --repo kubernetools/docgen \
            --pattern 'mcp-*-linux-x86_64' \
            --output mcp
          chmod +x mcp
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build image
        run: |
          tags_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && tags_args+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          label_args=()
          while IFS= read -r label; do
            [[ -n "$label" ]] && label_args+=(--label "$label")
          done <<< "${{ steps.meta.outputs.labels }}"
          podman build "${tags_args[@]}" "${label_args[@]}" --file Containerfile .

      - name: Push image
        run: |
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && podman push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
